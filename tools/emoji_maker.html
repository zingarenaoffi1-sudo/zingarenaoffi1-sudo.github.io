<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emoji Text Maker - Zing Arena</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .box { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 12px 25px; background: #3b82f6; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-size: 20px; word-wrap: break-word; }
    </style>
</head>
<body>
    <h2>😎 Emoji Text Maker</h2>
    <div class="box">
        <textarea id="textInput" placeholder="Text yahan likho..."></textarea>
        <input type="text" id="emojiInput" placeholder="Koi emoji dalo (e.g. 🔥)">
        <br>
        <button onclick="generateEmojiText()">Make Emoji Text</button>
        <div id="result"></div>
    </div>
    <br>
    <button onclick="window.history.back()">Back</button>

    <script>
        function generateEmojiText() {
            const text = document.getElementById('textInput').value;
            const emoji = document.getElementById('emojiInput').value || "⭐";
            
            // Har letter ko emoji se replace kar rahe hain
            const result = text.split('').map(char => char === ' ' ? '  ' : emoji).join('');
            document.getElementById('result').innerText = result;
        }
    </script>
</body>
</html>
