<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Age Calculator</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; display: inline-block; width: 300px; }
        input { width: 90%; padding: 10px; border-radius: 8px; border: none; margin: 10px 0; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>📅 Age Calculator</h2>
    <div class="box">
        <input type="date" id="dob">
        <button onclick="calculateAge()">Check Age</button>
        <h3 id="result"></h3>
    </div>
    <br>
    <button onclick="window.history.back()">Back</button>

    <script>
        function calculateAge() {
            let dob = new Date(document.getElementById('dob').value);
            let today = new Date();
            
            let age = today.getFullYear() - dob.getFullYear();
            let m = today.getMonth() - dob.getMonth();
            
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
                age--;
            }
            document.getElementById('result').innerText = "You are " + age + " years old!";
        }
    </script>
</body>
</html>
