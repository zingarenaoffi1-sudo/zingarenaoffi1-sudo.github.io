<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <title>Zing.Arena Dashboard</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; margin: 0; min-height: 100vh; }
        .app-container { width: 90%; max-width: 600px; text-align: center; } /* Max-width badha diya */
        #greetingMessage { margin-bottom: 10px; color: #60a5fa; font-weight: 300; font-size: 1.2rem; }
        #searchInput { width: 100%; padding: 15px; margin-bottom: 30px; border-radius: 30px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; text-align: center; box-sizing: border-box; font-size: 1.1rem; }
        
        /* Size bada karne ke liye changes */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; transition: 0.5s; }
        .blurred { opacity: 0.3; pointer-events: none; filter: blur(3px); }
        .menu-item { background: #1e293b; padding: 40px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; border: 2px solid #334155; font-size: 1.5rem; font-weight: bold; }
        .menu-item span { display: block; font-size: 3rem; margin-bottom: 10px; } /* Icon ka size bada kiya */
        .menu-item:hover { background: #3b82f6; transform: translateY(-10px); border-color: #60a5fa; }
        
        .terms-box { position: fixed; bottom: 20px; left: 20px; padding: 20px; background: #1e293b; border-radius: 15px; border: 1px solid #334155; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <h3 id="greetingMessage"></h3>
    <h2>Zing.Arena Hub</h2>
    <input type="text" id="searchInput" placeholder="Search tools..." onkeyup="filterTools()">

    <div class="menu-grid" id="mainMenu">
        <div class="menu-item" onclick="window.location.href='player.html'"><span>🎬</span> Player</div>
        <div class="menu-item" onclick="window.location.href='namegen.html'"><span>🔤</span> Name Gen</div>
        <div class="menu-item" onclick="window.location.href='tools.html'"><span>🛠️</span> Tools</div>
        <div class="menu-item" onclick="window.location.href='browser.html'"><span>🌐</span> Browser</div>
        <div class="menu-item" onclick="window.location.href='translator.html'"><span>🌍</span> Translator</div>
        <div class="menu-item" onclick="window.location.href='speedtest.html'"><span>⚡</span> Speed Test</div>
        <div class="menu-item" onclick="window.location.href='coderunner.html'"><span>💻</span> Code Runner</div>
    </div>
</div>

<div class="terms-box">
    <input type="checkbox" id="termsCheck" checked onchange="toggleAccess()"> 
    <label for="termsCheck"> I agree to the <a href="terms.html" style="color: #3b82f6;">Terms & Conditions</a></label>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('SW Failed', err));
        });
    }

    function setGreeting() {
        let hour = new Date().getHours();
        let greeting = (hour < 12) ? "Good Morning! ☀️" : (hour < 18) ? "Good Afternoon! 🌤️" : "Good Evening! 🌙";
        document.getElementById('greetingMessage').innerText = greeting;
    }
    setGreeting();

    function toggleAccess() {
        let isChecked = document.getElementById('termsCheck').checked;
        let menu = document.getElementById('mainMenu');
        menu.classList.toggle('blurred', !isChecked);
    }

    function filterTools() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let items = document.getElementsByClassName('menu-item');
        for (let i = 0; i < items.length; i++) {
            items[i].style.display = items[i].innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }
</script>

</body>
</html>
