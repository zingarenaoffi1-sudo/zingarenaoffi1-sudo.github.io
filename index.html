<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zing.Arena Dashboard</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; margin: 0; min-height: 100vh; }
        .app-container { width: 90%; max-width: 400px; text-align: center; }
        
        #searchInput { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; text-align: center; box-sizing: border-box; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .menu-item { background: #1e293b; padding: 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; border: 1px solid #334155; }
        .menu-item:hover { background: #3b82f6; transform: translateY(-5px); }

        .terms-box { position: fixed; bottom: 20px; left: 20px; padding: 15px; background: #1e293b; border-radius: 10px; border: 1px solid #334155; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Zing.Arena Hub</h2>

    <input type="text" id="searchInput" placeholder="Search tools..." onkeyup="filterTools()">

    <div class="menu-grid" id="mainMenu">
        <div class="menu-item" onclick="openTool('player.html')"><span>🎬</span> Player</div>
        <div class="menu-item" onclick="openTool('namegen.html')"><span>🔤</span> Name Gen</div>
        <div class="menu-item" onclick="openTool('tools.html')"><span>🛠️</span> Tools</div>
        <div class="menu-item" onclick="openTool('browser.html')"><span>🌐</span> Browser</div>
        <div class="menu-item" onclick="openTool('translator.html')"><span>🌍</span> Translator</div>
        <div class="menu-item" onclick="openTool('speedtest.html')"><span>⚡</span> Speed Test</div>
        <div class="menu-item" onclick="openTool('coderunner.html')"><span>💻</span> Code Runner</div>
    </div>
</div>

<div class="terms-box">
    <input type="checkbox" id="termsCheck" checked> 
    <label for="termsCheck"> I agree to the <a href="terms.html" style="color: #3b82f6;">Terms & Conditions</a></label>
</div>

<script>
    // Terms check logic
    function openTool(url) {
        let isChecked = document.getElementById('termsCheck').checked;
        if (isChecked) {
            window.location.href = url;
        } else {
            alert("Please accept the Terms & Conditions to access the tools.");
        }
    }

    function filterTools() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let items = document.getElementsByClassName('menu-item');
        for (let i = 0; i < items.length; i++) {
            let text = items[i].innerText.toLowerCase();
            items[i].style.display = text.includes(input) ? "" : "none";
        }
    }
</script>

</body>
</html>
