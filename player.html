<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zing Video Player</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        #playerContainer { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; margin-bottom: 20px; overflow: hidden; display: none; background: #000; }
        #mainPlayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #errorOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: #1e293b; z-index: 10; }
        .video-item { background: #1e293b; padding: 12px; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ef4444; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        .hidden { display: none !important; }
        #counter { text-align: center; font-size: 1.2em; margin-bottom: 10px; color: #60a5fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="loginGate">
    <h2>Player Access</h2>
    <button onclick="googleLogin()">Login with Google</button>
</div>

<div class="container hidden" id="playerSection">
    <div id="counter">Videos: 0 / 50</div>
    <div id="playerContainer">
        <iframe id="mainPlayer" src="" allowfullscreen></iframe>
        <div id="errorOverlay">
            <p>Video embed blocked.</p>
            <a id="instaLink" href="#" target="_blank" style="text-decoration:none; color:white; background:#e1306c; padding:10px; border-radius:5px; margin-top:10px;">Open Original Link</a>
        </div>
    </div>
    <input type="text" id="title" placeholder="Video Title">
    <input type="text" id="url" placeholder="YouTube or Instagram URL">
    <button onclick="pushLink()">Add Video</button>
    <div id="videoList" style="margin-top: 20px;"></div>
    <br>
    <button onclick="logoutUser()" style="background:#ef4444;">Logout</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDg-_--DQoINvqsMOAYfbwEnDyvMgH88-w",
        authDomain: "zing-arena.firebaseapp.com",
        databaseURL: "https://zing-arena-default-rtdb.firebaseio.com",
        projectId: "zing-arena",
        storageBucket: "zing-arena.firebasestorage.app",
        messagingSenderId: "749170646467",
        appId: "1:749170646467:web:1d279de6a84a0340bcf176"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(() => {
            window.location.href = "zingarena://login-success";
        }).catch(err => alert("Login Error: " + err.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('playerSection').classList.remove('hidden');
            loadData(user.uid);
        } else {
            document.getElementById('loginGate').classList.remove('hidden');
            document.getElementById('playerSection').classList.add('hidden');
        }
    });

    function logoutUser() {
        auth.signOut().then(() => {
            window.location.href = "zingarena://logout";
        });
    }

    function pushLink() {
        const userId = auth.currentUser.uid;
        const dbRef = db.ref('users/' + userId + '/playlist/');
        
        dbRef.once('value', snapshot => {
            if(snapshot.numChildren() >= 50) {
                alert("Maximum limit (50) reached! Delete some videos first.");
                return;
            }
            
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            if(!title || !url) return alert("Fill fields!");

            let embedUrl = url;
            let rawUrl = url;

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let v = url.split(/(vi\/|v=|\/v\/|youtu\.be\/|\/embed\/|\/shorts\/)/);
                let id = (v[2] !== undefined) ? v[2].split(/[^0-9a-z_-]/i)[0] : url;
                embedUrl = "https://www.youtube.com/embed/" + id;
            } else if (url.includes("instagram.com")) {
                embedUrl = url.split("?")[0] + "embed/";
            }
            
            dbRef.push({ title, url: embedUrl, rawUrl: rawUrl });
            document.getElementById('title').value = "";
            document.getElementById('url').value = "";
        });
    }

    function playVideo(url, rawUrl) {
        document.getElementById('playerContainer').style.display = "block";
        document.getElementById('errorOverlay').style.display = "none";
        document.getElementById('mainPlayer').src = url;
        document.getElementById('instaLink').href = rawUrl;
        
        // Agar iframe load nahi hua toh error dikhao
        setTimeout(() => {
            if(document.getElementById('mainPlayer').src !== "") {
                document.getElementById('errorOverlay').style.display = "flex";
            }
        }, 5000);
    }

    function loadData(uid) {
        db.ref('users/' + uid + '/playlist/').on('value', snapshot => {
            const list = document.getElementById('videoList');
            list.innerHTML = "";
            document.getElementById('counter').innerText = `Videos: ${snapshot.numChildren()} / 50`;
            snapshot.forEach(child => {
                const data = child.val();
                list.innerHTML += `<div class="video-item"><span>${data.title}</span> 
                <div><button onclick="playVideo('${data.url}', '${data.rawUrl}')" style="width:auto;">Play</button>
                <span class="delete-btn" onclick="db.ref('users/${uid}/playlist/${child.key}').remove()">X</span></div></div>`;
            });
        });
    }
</script>
</body>
</html>
