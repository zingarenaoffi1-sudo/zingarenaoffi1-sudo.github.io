<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding-top: 80px; padding-bottom: 80px; margin: 0; }
        input { width: 70%; padding: 10px; border-radius: 8px; border: none; }
        button { padding: 10px; width: 20%; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        /* Ad Styles */
        .sticky-top { position: fixed; top: 0; width: 100%; z-index: 9999; text-align: center; background: #0f172a; padding: 5px 0; }
        .sticky-bottom { position: fixed; bottom: 0; width: 100%; z-index: 9999; text-align: center; background: #0f172a; padding: 5px 0; }
    </style>
</head>
<body>

<div class="sticky-top">
    <script>(function(s){s.dataset.zone='11090187',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</div>

<div style="padding: 10px; margin-bottom:10px;">
    <input type="text" id="q" placeholder="Search anything...">
    <button onclick="go()">Go</button>
</div>
<iframe id="browserFrame" src="https://www.bing.com" style="width:100%; height:70vh; border-radius:15px; border:none; background:white;"></iframe>

<div class="sticky-bottom">
    <script>(function(s){s.dataset.zone='11090187',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</div>

<script>
    function go() {
        let q = document.getElementById('q').value;
        if(q) document.getElementById('browserFrame').src = "https://www.bing.com/search?q=" + encodeURIComponent(q);
    }
</script>
</body>
</html>
