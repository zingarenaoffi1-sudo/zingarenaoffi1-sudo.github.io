<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Runner | Zing Arena</title>
    <style>
        /* Dash-board style matching */
        body { background: #0f172a; color: #cbd5e1; font-family: 'Segoe UI', sans-serif; height: 95vh; margin: 0; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h3 { color: #3b82f6; margin: 0; }
        
        .editor-box { display: flex; flex: 1; gap: 15px; }
        
        /* Dark Theme Editor */
        textarea { flex: 1; background: #1e293b; color: #f8fafc; border: 1px solid #334155; padding: 15px; border-radius: 12px; resize: none; outline: none; font-family: monospace; font-size: 14px; }
        
        /* Output Frame Styling */
        iframe { flex: 1; background: #ffffff; border-radius: 12px; border: 1px solid #334155; }
        
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2563eb; }
        .back-btn { background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="controls">
        <h3>Web Runner (HTML/CSS/JS)</h3>
        <div>
            <button onclick="runCode()">Run Code ⚡</button>
            <button class="back-btn" onclick="window.location.href='index.html'">Back</button>
        </div>
    </div>
    
    <div class="editor-box">
        <textarea id="code" placeholder="Write your HTML here..."></textarea>
        <iframe id="output"></iframe>
    </div>

    <script>
        function runCode() {
            let code = document.getElementById('code').value;
            let output = document.getElementById('output');
            // srcdoc code ko safe way mein load karta hai
            output.srcdoc = code;
        }
    </script>
</body>
</html>
