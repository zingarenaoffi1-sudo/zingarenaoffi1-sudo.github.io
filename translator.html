<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zing Translator</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            background-color: #0f172a; 
            overflow: hidden; /* Scrollbars ko hatane ke liye */
        }
        iframe { 
            width: 100%; 
            height: 130%; /* Height badha di taaki header bahar chala jaye */
            border: none; 
            margin-top: -150px; /* Header ko upar dhakelne ke liye */
        }
    </style>
</head>
<body>
    <iframe src="https://www.bing.com/translator" allowfullscreen></iframe>
</body>
</html>
